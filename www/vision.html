<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Compute Boilerplate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas {
            image-rendering: pixelated; /* Keeps the noise looking sharp */
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center py-10">

    <h2 class="text-3xl font-bold mb-8 text-center">WebGPU Compute Boilerplate<br><span class="text-xl text-gray-400 font-normal">Random Noise to Grayscale</span></h2>
    
    <!-- Error Message Container -->
    <div id="errorMessage" class="hidden bg-red-900 border border-red-500 text-white p-4 rounded-md mb-6 max-w-lg text-center shadow-lg">
        <strong>WebGPU not detected.</strong><br>
        WebGPU is required for this demo. It is supported by default in modern versions of Chrome, Edge, and Opera on desktop.
    </div>

    <!-- Canvas Containers -->
    <div class="flex flex-col md:flex-row gap-8 mt-4">
        <div class="flex flex-col items-center">
            <h3 class="text-lg font-semibold mb-3 text-blue-300">1. Input (Generated on CPU)</h3>
            <canvas id="inputCanvas" width="256" height="256" class="border-2 border-gray-600 bg-black shadow-2xl rounded-sm"></canvas>
        </div>
        
        <div class="flex flex-col items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-500 hidden md:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-500 md:hidden my-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 13l-7 7-7-7m14-8l-7 7-7-7" />
            </svg>
        </div>

        <div class="flex flex-col items-center">
            <h3 class="text-lg font-semibold mb-3 text-green-300">2. Output (Processed on GPU)</h3>
            <canvas id="outputCanvas" width="256" height="256" class="border-2 border-gray-600 bg-black shadow-2xl rounded-sm"></canvas>
        </div>
    </div>

    <script>
        const WIDTH = 256;
        const HEIGHT = 256;
        const NUM_PIXELS = WIDTH * HEIGHT;
        const BUFFER_SIZE = NUM_PIXELS * 4; // 4 bytes per pixel (R, G, B, A)

        async function init() {
            // 1. Check for WebGPU Support
            if (!navigator.gpu) {
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            // 2. Setup CPU Canvas and Generate Random Noise
            const inputCtx = document.getElementById('inputCanvas').getContext('2d');
            const imgData = inputCtx.createImageData(WIDTH, HEIGHT);
            for (let i = 0; i < imgData.data.length; i += 4) {
                imgData.data[i] = Math.random() * 255;     // R
                imgData.data[i+1] = Math.random() * 255;   // G
                imgData.data[i+2] = Math.random() * 255;   // B
                imgData.data[i+3] = 255;                   // Alpha
            }
            inputCtx.putImageData(imgData, 0, 0);

            // 3. Initialize WebGPU Device
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                document.getElementById('errorMessage').innerHTML = "WebGPU adapter request failed.";
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }
            const device = await adapter.requestDevice();

            // 4. Create GPU Buffers
            // Input Buffer (Data goes CPU -> GPU)
            const inputBuffer = device.createBuffer({
                size: BUFFER_SIZE,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
            });
            device.queue.writeBuffer(inputBuffer, 0, imgData.data);

            // Output Buffer (Holds the result on the GPU)
            const outputBuffer = device.createBuffer({
                size: BUFFER_SIZE,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
            });

            // Staging Buffer (Used to pull data GPU -> CPU for rendering the debug view)
            const stagingBuffer = device.createBuffer({
                size: BUFFER_SIZE,
                usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
            });

            // 5. Write the Compute Shader (WGSL)
            const shaderCode = `
                @group(0) @binding(0) var<storage, read> inputData : array<u32>;
                @group(0) @binding(1) var<storage, read_write> outputData : array<u32>;

                @compute @workgroup_size(8, 8)
                fn main(@builtin(global_invocation_id) global_id : vec3<u32>) {
                    let x = global_id.x;
                    let y = global_id.y;
                    
                    // Prevent out-of-bounds execution
                    if (x >= ${WIDTH}u || y >= ${HEIGHT}u) { return; }

                    let index = y * ${WIDTH}u + x;
                    
                    // Unpack the RGBA bytes from the 32-bit integer
                    let pixel = inputData[index];
                    let r = f32(pixel & 255u);
                    let g = f32((pixel >> 8u) & 255u);
                    let b = f32((pixel >> 16u) & 255u);
                    let a = (pixel >> 24u) & 255u;

                    // Calculate Grayscale (simple luminosity formula)
                    let gray = u32(r * 0.299 + g * 0.587 + b * 0.114);

                    // Pack back into a 32-bit integer and write to output
                    outputData[index] = gray | (gray << 8u) | (gray << 16u) | (a << 24u);
                }
            `;

            const shaderModule = device.createShaderModule({ code: shaderCode });

            // 6. Setup the Pipeline and Bind Groups
            const computePipeline = device.createComputePipeline({
                layout: 'auto',
                compute: { module: shaderModule, entryPoint: 'main' }
            });

            const bindGroup = device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: inputBuffer } },
                    { binding: 1, resource: { buffer: outputBuffer } }
                ]
            });

            // 7. Encode and Submit Commands to the GPU
            const commandEncoder = device.createCommandEncoder();
            const passEncoder = commandEncoder.beginComputePass();
            passEncoder.setPipeline(computePipeline);
            passEncoder.setBindGroup(0, bindGroup);
            // Dispatch threads: Because our workgroup size is 8x8, we need WIDTH/8 groups horizontally
            passEncoder.dispatchWorkgroups(Math.ceil(WIDTH / 8), Math.ceil(HEIGHT / 8));
            passEncoder.end();

            // Copy output to the staging buffer so the CPU can read it
            commandEncoder.copyBufferToBuffer(outputBuffer, 0, stagingBuffer, 0, BUFFER_SIZE);
            device.queue.submit([commandEncoder.finish()]);

            // 8. Read Back Data and Draw to Output Canvas
            await stagingBuffer.mapAsync(GPUMapMode.READ);
            const resultArray = new Uint8ClampedArray(stagingBuffer.getMappedRange());
            
            const outputCtx = document.getElementById('outputCanvas').getContext('2d');
            const outputImgData = new ImageData(resultArray, WIDTH, HEIGHT);
            outputCtx.putImageData(outputImgData, 0, 0);

            stagingBuffer.unmap();
        }

        // Run the WebGPU initialization
        init();
    </script>
</body>
</html>
